openapi: 3.0.0
info:
  title: Dotted Names API
  version: 1.0.0
  description: API with dotted schema names for testing namespace generation

paths:
  /orders:
    get:
      operationId: listOrders
      summary: List all orders
      responses:
        '200':
          description: A list of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Commerce.Order'
    post:
      operationId: createOrder
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Commerce.NewOrder'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Commerce.Order'

  /orders/{orderId}:
    get:
      operationId: getOrderById
      summary: Get an order by ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Commerce.Order'

components:
  schemas:
    Commerce.Order:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: integer
          format: int64
          description: Order identifier
        status:
          $ref: '#/components/schemas/Commerce.OrderStatus'
        customer:
          $ref: '#/components/schemas/Identity.Customer'

    Commerce.NewOrder:
      type: object
      required:
        - customerId
      properties:
        customerId:
          type: integer
          format: int64

    Commerce.OrderStatus:
      type: string
      description: The status of an order
      enum:
        - pending
        - confirmed
        - shipped

    Identity.Customer:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    SimpleModel:
      type: object
      properties:
        value:
          type: string
